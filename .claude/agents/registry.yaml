skills:
  plan-hardening:
    version: 1.5.0
    path: .claude/skills/plan-hardening/SKILL.md
    depends_on:
      codex-orchestration: 0.x
  codex-orchestration:
    version: 0.1.0
    path: .claude/skills/codex-orchestration/SKILL.md
    depends_on:
      quality-management-gh: 1.x
      quality-mgr: 0.x
      req-qa: 0.x
      arch-qa: 0.x
      flaky-test-qa: 0.x
      rust-qa-agent: 0.x
      rust-best-practices-agent: 0.x
      # rust-service-hardening-agent intentionally omitted: that skill
      # (rust-service-hardening) is not imported into this repo; the
      # workflow treats it as optional (see SKILL.md caveat).
  quality-management-gh:
    version: 1.0.0
    path: .claude/skills/quality-management-gh/SKILL.md
    depends_on:
      quality-mgr: 0.x
  rust-development:
    version: 0.11.0
    path: .claude/skills/rust-development/SKILL.md
    depends_on:
      rust-architect: 0.x
      rust-code-reviewer: 0.x
      rust-code-explorer: 0.x
      rust-developer: 0.x
  rust-best-practices:
    version: 0.11.0
    path: .claude/skills/rust-best-practices/SKILL.md
    depends_on:
      rust-best-practices-agent: 0.x
      rust-architect: 0.x
      rust-code-reviewer: 0.x
      rust-code-explorer: 0.x
