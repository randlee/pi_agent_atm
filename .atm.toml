[atm]
default_team = "pi"

[atm.idle_notify]
recipient = "team-lead"

[atm.idle_notify.agent.cpi]
seconds = 60

[[atm.post_send_hooks]]
recipient = "cpi"
command = ["scripts/atm-nudge-xml-1.py", "cpi"]

[[atm.post_send_hooks]]
recipient = "quality-mgr"
command = ["scripts/atm-nudge-xml-1.py", "quality-mgr"]

[[atm.post_send_hooks]]
recipient = "team-lead"
command = ["scripts/atm-nudge-xml-1.py", "team-lead"]

[plugins.atm-agent-mcp]
codex_bin = "codex"
identity = "cpi"
sandbox = "workspace-write"
approval_policy = "on-failure"

[startup.team-lead]
all = ["Read .claude/skills/pi-agent-rust/SKILL.md"]

# ── rmux: tmux session launcher ──────────────────────────────────────
[rmux]
session = "pi"

[[rmux.windows]]
name = "agents"
layout = "even-horizontal"

[[rmux.windows.panes]]
name = "team-lead"
tmux_pane_id = "%3"
model = "sonnet"
color = "blue"
env = { ATM_IDENTITY = "team-lead", ATM_TEAM = "pi", CLAUDE_CODE_TASK_LIST_ID = "pi" }

[[rmux.windows.panes]]
name = "cpi"
tmux_pane_id = "%4"
command = "codex -c features.codex_hooks=true --yolo"
env = { ATM_IDENTITY = "cpi", ATM_TEAM = "pi", CLAUDE_CODE_TASK_LIST_ID = "pi" }

[[rmux.windows.panes]]
name = "quality-mgr"
tmux_pane_id = "%5"
model = "sonnet"
color = "blue"
env = { ATM_IDENTITY = "quality-mgr", ATM_TEAM = "pi", CLAUDE_CODE_TASK_LIST_ID = "pi" }
