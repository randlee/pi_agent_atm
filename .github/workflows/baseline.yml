name: baseline

on:
  pull_request:
    paths-ignore:
      - docs/plans/**

jobs:
  baseline:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      RUST_BACKTRACE: "1"
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Just help
        run: just help

      - name: Format gate
        run: just fmt check

      - name: Compile gate
        run: just test compile

      - name: Basic unit gate
        run: just test unit-basic
