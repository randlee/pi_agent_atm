name: baseline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  baseline:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      RUST_BACKTRACE: "1"
      CARGO_INCREMENTAL: "0"
      VCR_MODE: "playback"
      VCR_CASSETTE_DIR: "tests/fixtures/vcr"
      SMOKE_CARGO_RUNNER: "local"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format gate
        run: just fmt check

      - name: Clippy lib
        run: just lint clippy-lib

      - name: Clippy bins
        run: just lint clippy-bins

      - name: Baseline smoke test
        run: just test baseline
